{% extends "base.html" %}
{% block content %}
<div class="glass-card admin-panel">
    <h2 class="dashboard-title" style="margin-bottom:14px;">All bids (latest 500)</h2>
    <div class="table-scroll">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Item</th>
                    <th>Bidder</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <td>{{ row.bid.timestamp }}</td>
                    <td>{{ row.item.name }}</td>
                    <td>{{ row.user.username }}</td>
                    <td>₹ {{ row.bid.amount }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <a class="btn btn-ghost" href="{{ url_for('admin_dashboard') }}" style="margin-top:16px;">← Admin home</a>
</div>
{% endblock %}
