{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
    <div class="panel glass-card">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Sign in to place bids and manage your auctions.</p>

        <form method="POST" class="form-stack">
            <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
            <div class="field">
                <input class="input" id="login_email" name="email" type="email" placeholder=" " required>
                <label for="login_email">Email</label>
            </div>

            <div class="field">
                <input class="input" id="login_password" name="password" type="password" placeholder=" " required>
                <label for="login_password">Password</label>
            </div>

            <button class="btn btn-gradient btn-block" type="submit">Login</button>
        </form>

        <p class="auth-subtitle" style="margin-top:16px; text-align:center;">
            Don't have an account?
            <a href="{{ url_for('register') }}" style="text-decoration:none; color:rgba(236,236,255,.95); border-bottom:1px solid rgba(168,85,247,.4);">
                Register
            </a>
        </p>
    </div>
</section>
{% endblock %}
